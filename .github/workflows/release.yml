name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          wails build -platform windows/amd64 -ldflags "-X main.Version=$tag"
          if (-not (Test-Path "build/bin/rtaskmgr.exe")) {
            throw "build/bin/rtaskmgr.exe not produced"
          }

      - name: Generate release notes from commits
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # Find the previous tag (excluding this one). If none, fall back to
          # the entire history.
          $prev = git tag --sort=-v:refname | Where-Object { $_ -ne $tag } | Select-Object -First 1
          if ($prev) {
            $range = "$prev..$tag"
          } else {
            $range = $tag
          }
          $body = git log $range --pretty=format:"- %s" --no-merges
          if (-not $body) { $body = "- $tag" }
          $header = "## $tag`r`n`r`n"
          ($header + ($body -join "`r`n")) | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: build/bin/rtaskmgr.exe
          draft: false
          prerelease: false
